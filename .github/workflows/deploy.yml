name: Build & Deploy to https://github.com/Yeobi00/ceos.week5.next-netflix-23rd

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Prepare output
        run: |
          rm -rf output
          mkdir -p output
          rsync -a \
            --exclude='output' \
            --exclude='.git' \
            --exclude='.github' \
            ./ output/

      - name: Push to https://github.com/Yeobi00/ceos.week5.next-netflix-23rd
        id: push
        uses: cpina/github-action-push-to-another-repository@v1.7.2
        env:
          API_TOKEN_GITHUB: ${{ secrets.AUTO_ACTIONS }}
        with:
          source-directory: 'output'
          destination-github-username: Yeobi00
          destination-repository-name: ceos.week5.next-netflix-23rd
          user-name: GitHub Actions
          user-email: ${{ secrets.EMAIL }}
          commit-message: 'Deploy from build: ${{ github.sha }}'
          target-branch: master