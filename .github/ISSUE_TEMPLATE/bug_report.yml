name: 🐞 Bug Report
description: 버그를 발견했을 때 작성해주세요
title: "fix: "
type: Bug
labels: ["type: fix", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        버그 리포트를 작성해주셔서 감사합니다! 빠른 확인을 위해 아래 항목을 채워주세요.

  - type: checkboxes
    id: prerequisites
    attributes:
      label: 사전 확인
      options:
        - label: 비슷한 이슈가 이미 등록되어 있는지 검색했습니다
          required: true
        - label: 최신 버전에서도 문제가 재현됩니다
          required: true

  - type: textarea
    id: description
    attributes:
      label: 무엇이 문제인가요?
      description: 어떤 동작을 기대했고, 실제로는 어떤 일이 일어났는지 설명해주세요
      placeholder: 예) 로그인 후 메인 페이지로 이동해야 하는데 500 에러가 발생합니다
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: 재현 단계
      description: 문제를 재현할 수 있는 단계를 순서대로 적어주세요
      value: |
        1. 
        2. 
        3.
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: 버전
      placeholder: "예: v1.2.3, commit abc123"
    validations:
      required: true

  - type: dropdown
    id: environment
    attributes:
      label: 실행 환경
      multiple: true
      options:
        - macOS
        - Windows
        - Linux
        - iOS
        - Android
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: 로그 / 에러 메시지
      description: 관련 로그가 있다면 붙여넣어주세요. 코드 블록으로 자동 포맷됩니다.
      render: shell

  - type: textarea
    id: additional
    attributes:
      label: 추가 정보
      description: 스크린샷, 관련 이슈 링크 등 도움이 될 만한 내용을 자유롭게 적어주세요.
