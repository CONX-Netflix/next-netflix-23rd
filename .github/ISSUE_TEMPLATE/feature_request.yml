name: ✨ Feature Request
description: 새로운 기능을 제안해주세요
title: "feat: "
type: Feature
labels: ["type: feat", "triage"]
body:
  - type: textarea
    id: problem
    attributes:
      label: 어떤 문제를 해결하고 싶나요?
      description: 현재 어떤 불편함이나 한계가 있는지 설명해주세요
      placeholder: 예) 현재는 X를 하기 위해 매번 Y를 수동으로 해야 합니다
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 제안하는 해결책
      description: 어떻게 동작하면 좋을지 구체적으로 설명해주세요
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 고려한 대안
      description: 다른 방식도 검토해봤다면 함께 적어주세요

  - type: dropdown
    id: priority
    attributes:
      label: 우선순위 (제안자 기준)
      options:
        - Low - 있으면 좋음
        - Medium - 작업 효율에 영향
        - High - 현재 작업이 막혀있음
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: 추가 정보
      description: 참고할 만한 자료, 예시, 스크린샷 등
